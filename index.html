<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>일정 투표 도구</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  :root{
    --purple:#D97706; --purpleDark:#B45309; --terracotta:#D97706;
    --ivory:#F8FAFC; --ink:#111827; --line:#E5E7EB; --gray:#6B7280;
    --green:#15803D; --redbg:#FEF2F2; --red:#EF4444; --onPrimary:#451A03;
    --primaryLight:#FEF3C7; --primaryDisabled:#FDE68A; --recCardBg:#FFFBEB;
    --warning:#EA580C; --warningBg:#FFF7ED; --warningText:#9A3412;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ivory);font-family:'Pretendard','Noto Sans KR',-apple-system,sans-serif;color:var(--ink);}
  .wrap{max-width:460px;margin:0 auto;padding:32px 18px 64px;}
  .eyebrow{display:flex;align-items:center;gap:6px;color:var(--gray);font-size:12px;letter-spacing:.5px;margin-bottom:4px;}
  h1{font-size:22px;font-weight:800;margin:0 0 22px;line-height:1.35;letter-spacing:-.2px;}
  .tabs{display:flex;gap:4px;background:var(--primaryLight);padding:5px;border-radius:16px;margin-bottom:20px;}
  .tab{flex:1;padding:10px 0;border:none;background:transparent;border-radius:12px;font-size:13px;font-weight:700;color:var(--purpleDark);cursor:pointer;transition:.15s;}
  .tab.active{background:var(--purple);color:var(--onPrimary);box-shadow:0 2px 6px rgba(217,119,6,.3);}
  .card{background:#fff;border-radius:16px;padding:20px;border:1px solid var(--line);}
  .section-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;margin:26px 0 12px;color:var(--ink);}
  .char-icon{width:20px;height:20px;flex:none;vertical-align:-5px;}
  .section-label:first-child{margin-top:0;}
  select.name-select{width:100%;border:none;background:transparent;font-size:15px;font-weight:700;color:var(--ink);padding:4px 0 0;outline:none;}
  .name-label{font-size:12px;color:var(--gray);font-weight:600;}
  .notice{margin-top:10px;padding:12px 14px;border-radius:14px;font-size:12px;background:var(--primaryLight);color:var(--purpleDark);display:flex;gap:6px;align-items:center;}
  .notice.success{background:#ECFDF3;color:#15803D;}
  .error-box{margin-bottom:14px;padding:12px 14px;border-radius:14px;font-size:13px;background:var(--redbg);color:var(--red);display:flex;gap:6px;align-items:center;}

  /* Calendar */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-header button{border:none;background:var(--primaryLight);color:var(--purpleDark);width:30px;height:30px;border-radius:10px;font-weight:800;cursor:pointer;}
  .cal-title{font-size:14px;font-weight:800;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-wd{text-align:center;font-size:10px;color:var(--gray);font-weight:700;padding-bottom:4px;}
  .cal-day{aspect-ratio:1;border-radius:12px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);}
  .cal-day.empty{visibility:hidden;cursor:default;}
  .cal-day.disabled{color:#CBD5E1;background:#F1F5F9;cursor:not-allowed;}
  .cal-day.selected{background:var(--purple);color:var(--onPrimary);border-color:var(--purple);box-shadow:0 2px 6px rgba(217,119,6,.3);}
  .cal-hint{font-size:11px;color:var(--gray);margin-top:10px;}
  .quick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .quick-btn{padding:10px 0;border-radius:12px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:700;color:var(--purpleDark);cursor:pointer;}
  .quick-btn.active{background:var(--purple);color:var(--onPrimary);border-color:var(--purple);}
  .quick-hint{font-size:11px;color:var(--gray);margin-top:10px;}

  /* Time grid */
  .time-presets{display:flex;gap:6px;margin-bottom:10px;}
  .preset-btn{flex:1;padding:8px 0;border-radius:12px;border:1px solid var(--line);background:#fff;font-size:11px;font-weight:700;color:var(--purpleDark);cursor:pointer;}
  .time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;touch-action:none;user-select:none;}
  .time-cell{padding:10px 0;border-radius:12px;border:1px solid var(--line);background:#fff;text-align:center;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;}
  .time-cell.active{background:var(--purple);color:var(--onPrimary);border-color:var(--purple);}
  .time-hint{font-size:11px;color:var(--gray);margin-top:10px;}

  /* Region map */
  #mapbox{width:100%;height:320px;border-radius:16px;overflow:hidden;border:1px solid var(--line);}
  #resultMapbox{width:100%;height:340px;border-radius:16px;overflow:hidden;border:1px solid var(--line);}
  .region-label{background:#fff;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.12);}
  .region-label::before{display:none;}
  .region-picked{margin-top:10px;font-size:12px;color:var(--purpleDark);font-weight:700;}
  .region-hint{font-size:11px;color:var(--gray);margin-top:4px;}

  textarea.memo{width:100%;padding:14px;border-radius:14px;border:1px solid var(--line);font-size:13px;color:var(--ink);resize:none;outline:none;font-family:inherit;}

  .submit-btn{width:100%;margin-top:26px;padding:16px 0;border-radius:16px;border:none;font-weight:800;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--purple);color:var(--onPrimary);box-shadow:0 4px 14px rgba(217,119,6,.28);transition:.15s;}
  .submit-btn:not(:disabled):hover{background:var(--purpleDark);}
  .submit-btn:disabled{background:var(--primaryDisabled);color:#fff;box-shadow:none;cursor:not-allowed;}
  .submit-btn.saved{background:var(--green);box-shadow:0 4px 14px rgba(34,197,94,.28);}
  .helper{text-align:center;font-size:11px;color:var(--gray);margin-top:8px;}
  .dt-helper{margin-top:8px;}

  /* Results */
  .stat-hero{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:14px;}
  .stat-icon{width:54px;height:54px;border-radius:50%;background:var(--primaryLight);display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;}
  .stat-hero .lbl{color:var(--gray);font-size:12px;font-weight:600;}
  .stat-hero .val{color:var(--ink);font-size:19px;font-weight:800;margin-top:2px;}
  .stat-legend{display:flex;gap:14px;margin-top:8px;font-size:11.5px;color:var(--gray);flex-wrap:wrap;}
  .stat-legend span{display:flex;align-items:center;gap:5px;}
  .stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex:none;}
  .ring-wrap{flex:none;text-align:center;}
  .ring-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:17px;font-weight:800;color:var(--purpleDark);}
  .ring-caption{font-size:10px;color:var(--gray);margin-top:5px;}
  .rec-card{border-radius:16px;padding:18px;background:var(--recCardBg);margin-bottom:12px;}
  .rec-title{font-size:12px;color:var(--purpleDark);font-weight:800;margin-bottom:6px;}
  .rec-main{display:flex;align-items:baseline;gap:10px;}
  .rec-date{font-size:22px;font-weight:800;}
  .rec-time{font-size:19px;font-weight:800;color:var(--purpleDark);}
  .rec-sub{font-size:12px;color:var(--gray);margin-top:4px;}
  .bar-row-wrap{margin-bottom:12px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
  .bar-names{font-size:11px;color:var(--gray);padding-left:28px;margin-top:-4px;}
  .bar-rank{width:16px;font-size:11px;font-weight:800;color:var(--gray);}
  .bar-rank.top{color:var(--purpleDark);}
  .bar-label{width:104px;flex-shrink:0;font-size:11.5px;font-weight:700;line-height:1.25;}
  .bar-track{flex:1;height:8px;border-radius:6px;background:var(--line);overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;background:var(--purple);}
  .bar-count{width:40px;text-align:right;font-size:11px;font-weight:800;}
  .heatmap-wrap{overflow-x:auto;}
  .heatmap-row{display:flex;align-items:center;margin-bottom:3px;}
  .heatmap-date{width:52px;font-size:11px;font-weight:700;flex-shrink:0;position:sticky;left:0;background:#fff;z-index:2;padding-right:4px;}
  .heatmap-cell{width:30px;height:22px;margin:0 2px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
  .heatmap-hdr{display:flex;margin-bottom:4px;}
  .heatmap-hcell{width:30px;margin:0 2px;text-align:center;font-size:9px;color:var(--gray);flex-shrink:0;}
  .empty-note{text-align:center;padding:40px 0;color:var(--gray);font-size:13px;}

  /* Admin */
  .gate{text-align:center;padding:32px 20px;margin-top:6px;}
  .gate .t{font-size:13px;font-weight:700;margin-top:10px;}
  .gate .s{font-size:12px;color:var(--gray);margin-top:4px;}
  .admin-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-top:1px solid var(--line);}
  .admin-row:first-child{border-top:none;}
  .voted{color:var(--green);font-size:12px;font-weight:700;}
  .notvoted{color:var(--warningText);font-size:12px;font-weight:700;}
  .detail-card{border-radius:14px;padding:12px 14px;border:1px solid var(--line);background:#fff;margin-bottom:8px;}
  .refresh-link{background:none;border:none;color:var(--purpleDark);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;}
  .code-chip{background:var(--primaryLight);border:none;color:var(--purpleDark);font-size:12px;font-weight:700;cursor:pointer;padding:7px 12px;border-radius:999px;}
  .admin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .missing-box{margin-top:14px;padding:12px 14px;border-radius:14px;font-size:12px;background:var(--warningBg);color:var(--warningText);}
  .loading{text-align:center;padding:80px 0;color:var(--gray);}

  /* Finalize / share */
  .finalize-card{border-radius:16px;padding:18px;background:#fff;border:2px solid var(--purple);margin-bottom:14px;}
  .finalize-banner{border-radius:16px;padding:16px 18px;background:#ECFDF3;border:1px solid #BBF7D0;margin-bottom:18px;}
  .finalize-banner .t{color:#15803D;font-size:12px;font-weight:800;margin-bottom:4px;}
  .finalize-banner .m{color:var(--ink);font-size:17px;font-weight:800;}
  .finalize-banner .s{color:#15803D;font-size:12px;margin-top:4px;}
  .pick-btn{width:100%;text-align:left;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .pick-btn.selected{border-color:var(--purple);background:var(--primaryLight);}
  .share-send-btn{background:var(--purple);color:var(--onPrimary);border:none;font-size:12px;font-weight:700;padding:7px 14px;border-radius:999px;cursor:pointer;flex:none;}
  .share-send-btn:active{background:var(--purpleDark);}
  .cta-green{background:var(--green);box-shadow:0 4px 14px rgba(34,197,94,.28);}
  .cta-green:hover{background:#16A34A;}
  .share-btn{background:var(--primaryLight);color:var(--purpleDark);border:none;font-size:12px;font-weight:700;cursor:pointer;padding:7px 12px;border-radius:999px;display:flex;align-items:center;gap:4px;}
</style>
</head>

  ];
  const TODAY = (() => { const t = new Date(); t.setHours(0,0,0,0); return t; })(); // always the real "today", not a fixed date
  const DB_URL = "https://whencanwemeet-7e698-default-rtdb.firebaseio.com";

  const state = {
    screen: "vote",
    roomCode: null,
    roomConfig: null, // { title, members }
    currentUser: "",
    draft: { dates: [], times: [], regions: [], memo: "" },

    pinInput: "",

  const app = document.getElementById("app");
  const pad = n => String(n).padStart(2,"0");
  const dkey = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
  const fmtLabel = (key) => { const [y,m,d]=key.split("-").map(Number); return `${m}/${d}`; };
  const weekdayOf = (key) => { const [y,m,d]=key.split("-").map(Number); return WD[new Date(y,m-1,d).getDay()]; };

  function toDraft(existing){
    if(!existing) return { dates:[], times:[], regions:[], memo:"" };
    const regions = existing.regions ? existing.regions.slice() : (existing.region ? [existing.region] : []);
    return { dates:(existing.dates||[]).slice(), times:(existing.times||[]).slice(), regions, memo: existing.memo||"" };
  }

  // "create" = no vote yet (or an old vote with no pin) -> user sets a new 4-digit pin.
  // "verify" = a vote with a pin already exists -> user must type the matching pin to edit/resubmit.
  function getPinMode(){
    const existing = state.currentUser ? state.allVotes[state.currentUser] : null;
    return (existing && existing.pin) ? "verify" : "create";
  }

  function isPinValid(){
    if(!state.currentUser) return false;
    if(getPinMode()==="verify"){
      const existing = state.allVotes[state.currentUser];
      const currentOk = state.pinInput === existing.pin;
      if(!currentOk) return false;
      if(state.pinChangeMode) return /^\d{4}$/.test(state.newPinInput);
      return true;
    }
    return /^\d{4}$/.test(state.pinInput);
  }

  // Gates whether the rest of the form (dates/times/regions/memo/submit) is even shown.
  // "create" mode (not voted yet) still requires an explicit "this is really me" confirmation,
  // so someone can't casually click through an unvoted teammate's name and submit for them.
  // "verify" mode (already voted) requires the correct 4-digit pin before anything is revealed.
  function isFormUnlocked(){
    if(!state.currentUser) return false;
    if(getPinMode()==="create") return !!state.identityConfirmed;
    const existing = state.allVotes[state.currentUser];
    return state.pinInput.length===4 && state.pinInput === existing.pin;
  }

  async function loadAllVotes(){
    state.loading = true; state.error=""; render();
    try{
      const res = await fetch(`${DB_URL}/rooms/${state.roomCode}/votes.json?_=${Date.now()}`, { cache: "no-store" });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      state.allVotes = data || {};
      try{
        const fRes = await fetch(`${DB_URL}/rooms/${state.roomCode}/finalized.json?_=${Date.now()}`, { cache: "no-store" });
        state.finalized = fRes.ok ? (await fRes.json()) : null;
      }catch(e2){ /* non-fatal: finalized banner just won't show */ }
    }catch(e){
      state.error = "데이터를 불러오지 못했어요. 새로고침 버튼을 눌러주세요. (" + (e && e.message || e) + ")";
    }
    state.loading = false;
    const existing = state.currentUser ? state.allVotes[state.currentUser] : null;
    state.draft = toDraft(existing);
    state.quickActive = new Set();
    render();
  }

  // Region preference tally among a specific subset of names (e.g. people available for one combo).
  function regionCountsAmong(namesSubset){
    return REGIONS.map(r=>{
      const c = namesSubset.filter(n=>{
        const v = state.allVotes[n];
        return v.regions ? v.regions.includes(r.name) : v.region === r.name;
      }).length;
      return { region: r.name, count: c };
    }).filter(r=>r.count>0).sort((a,b)=>b.count-a.count);
  }

  // Shared by results screen and admin screen so both compute the same date+time combos.
  function computeComboList(){
    const votedNames = Object.keys(state.allVotes);
    const dateSet = new Set();
    votedNames.forEach(n => (state.allVotes[n].dates||[]).forEach(d=>dateSet.add(d)));
    const dateList = Array.from(dateSet).sort();
    const times = getTimes();
    const comboList = [];
    dateList.forEach(dk => {
      times.forEach(t => {
        const names = votedNames.filter(n => (state.allVotes[n].dates||[]).includes(dk) && (state.allVotes[n].times||[]).includes(t));
        if(names.length>0) comboList.push({ date: dk, time: t, count: names.length, names });
      });
    });
    comboList.sort((a,b)=>b.count-a.count);
    return comboList;
  }

  async function finalizeSchedule(date, time){
    state.error = "";
    try{
      const votedNames = Object.keys(state.allVotes);
      const names = votedNames.filter(n => (state.allVotes[n].dates||[]).includes(date) && (state.allVotes[n].times||[]).includes(time));
      const topRegion = regionCountsAmong(names)[0];
      const payload = {
        date, time, count: names.length,
        region: topRegion ? topRegion.region : null,
        confirmedAt: new Date().toISOString(), confirmedBy: state.currentUser || "",
      };
      const res = await fetch(`${DB_URL}/rooms/${state.roomCode}/finalized.json`, {
        method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload),
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      state.finalized = payload;
      renderAdminScreen();
    }catch(e){
      state.error = "일정 확정에 실패했어요. 다시 시도해주세요. (" + (e && e.message || e) + ")";
      renderAdminScreen();
    }
  }

  async function unfinalizeSchedule(){

    try{

      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      state.finalized = null;
      renderAdminScreen();
    }catch(e){
      state.error = "확정 취소에 실패했어요. 다시 시도해주세요. (" + (e && e.message || e) + ")";

    }
  }

    const sure = confirm(`"${title}" 모임을 완전히 삭제할까요?\n투표 데이터, 확정된 일정이 모두 지워지고 되돌릴 수 없어요.`);
    if(!sure) return;
    try{
      const res = await fetch(`${DB_URL}/rooms/${state.roomCode}.json`, { method: "DELETE" });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);

  async function submitVote(){
    if(!state.currentUser){
      showInlineError("먼저 이름을 선택해주세요.", false);
      return;
    }
    const pinMode = getPinMode();
    if(!isPinValid()){
      showInlineError(pinMode==="verify" ? "비밀번호가 일치하지 않아요." : "4자리 숫자 비밀번호를 만들어주세요.", false);
      return;
    }
    const pinToSave = pinMode==="verify"
      ? (state.pinChangeMode ? state.newPinInput : state.allVotes[state.currentUser].pin)
      : state.pinInput;
    state.saving = true; state.error=""; refreshDynamicUI(); clearInlineError();
    const payload = { ...state.draft, pin: pinToSave, submittedAt: new Date().toISOString() };
    let ok = false, lastErr = null;
    for(let attempt=0; attempt<2 && !ok; attempt++){
      try{
        const res = await fetch(`${DB_URL}/rooms/${state.roomCode}/votes/${encodeURIComponent(state.currentUser)}.json`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        ok = true;
      }catch(e){
        lastErr = e;
        if(attempt===0) await new Promise(res=>setTimeout(res,600));
      }
    }
    if(ok){
      state.allVotes[state.currentUser] = payload;
      state.saved = true;
      state.saving = false;
      state.pinInput = pinToSave;
      state.pinChangeMode = false;
      state.newPinInput = "";
      state.screen = "results";
      state.error = "";
      render();
      window.scrollTo(0, 0);
      return;
    }else{
      const reason = (lastErr && (lastErr.message || String(lastErr))) || "알 수 없는 오류";
      state.error = `투표 저장에 실패했어요 (${reason})`;
      showInlineError(state.error, true);
    }
    state.saving = false;
    refreshDynamicUI();
    updateVotedNotice();
  }

  function clearInlineError(){

  function showInlineError(msg, withRetry){

    if(!box){
      box = document.createElement("div");
      box.className = "error-box";
      body.parentElement.insertBefore(box, body);
    }
    box.innerHTML = "";
    const span = document.createElement("span");
    span.textContent = "⚠️ " + msg;
    box.appendChild(span);
    if(withRetry){
      const retryBtn = document.createElement("button");
      retryBtn.textContent = "다시 시도";

      retryBtn.addEventListener("click", submitVote);
      box.appendChild(retryBtn);
    }
  }

  function updateVotedNotice(){

  // ---------- LANDING SCREEN (room join / create) ----------
  function shiftRangeMonth(delta){
    let m = state.landingDraft.rangeCalMonth + delta, y = state.landingDraft.rangeCalYear;
    if(m<0){m=11;y--;} if(m>11){m=0;y++;}
    state.landingDraft.rangeCalMonth = m; state.landingDraft.rangeCalYear = y;
    const title = document.getElementById("rangeCalTitle");
    if(title) title.textContent = `${y}년 ${m+1}월`;
    buildRangeCalendar();
  }

  function buildRangeCalendar(){
    const grid = document.getElementById("rangeCalGrid");
    if(!grid) return;
    const y = state.landingDraft.rangeCalYear, m = state.landingDraft.rangeCalMonth;
    const firstDay = new Date(y,m,1).getDay();
    const daysInMonth = new Date(y,m+1,0).getDate();
    const { dateStart, dateEnd } = state.landingDraft;
    let html = WD.map(w=>`<div class="cal-wd">${w}</div>`).join("");
    for(let i=0;i<firstDay;i++) html += `<div class="cal-day empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const key = dkey(y,m,d);
      const isStart = key===dateStart;
      const isEnd = key===dateEnd;
      const inRange = dateStart && dateEnd && key>dateStart && key<dateEnd;
      let cls = "cal-day";
      let style = "";
      if(isStart || isEnd){ style = "background:var(--purple);color:var(--onPrimary);border-color:var(--purple);"; }
      else if(inRange){ style = "background:var(--primaryLight);color:var(--purpleDark);border-color:var(--primaryLight);"; }
      html += `<div class="${cls}" data-key="${key}" style="${style}">${d}</div>`;
    }
    grid.innerHTML = html;
    grid.querySelectorAll(".cal-day:not(.empty)").forEach(cell=>{
      cell.addEventListener("click", ()=>{
        const key = cell.dataset.key;
        let { dateStart, dateEnd } = state.landingDraft;
        if(!dateStart || (dateStart && dateEnd)){
          // starting a fresh selection
          state.landingDraft.dateStart = key;
          state.landingDraft.dateEnd = "";
        }else{
          // we already have a start, this click sets the other end (swap if picked an earlier date)
          if(key < dateStart){
            state.landingDraft.dateEnd = dateStart;
            state.landingDraft.dateStart = key;
          }else{
            state.landingDraft.dateEnd = key;
          }
        }
        buildRangeCalendar();
        const hint = document.getElementById("rangeHint");
        if(hint){
          const s = state.landingDraft.dateStart, e = state.landingDraft.dateEnd;
          hint.textContent = (s||e) ? `선택됨: ${s||"?"} ~ ${e||"(끝나는 날짜를 눌러주세요)"}` : "시작 날짜를 먼저 누르고, 끝나는 날짜를 눌러주세요.";
        }
        // show/hide the reset button depending on whether anything is selected now
        const hasSelection = !!(state.landingDraft.dateStart || state.landingDraft.dateEnd);
        let resetBtn = document.getElementById("rangeResetBtn");
        if(hasSelection && !resetBtn){
          resetBtn = document.createElement("button");
          resetBtn.id = "rangeResetBtn"; resetBtn.type = "button";
          resetBtn.className = "refresh-link"; resetBtn.style.marginTop = "6px";
          resetBtn.textContent = "↺ 범위 초기화";
          resetBtn.addEventListener("click", ()=>{
            state.landingDraft.dateStart = ""; state.landingDraft.dateEnd = "";
            renderLandingScreen();
          });
          document.getElementById("rangeHint").insertAdjacentElement("afterend", resetBtn);
        }
      });
    });
  }

        <button type="button" id="advancedToggleBtn" class="refresh-link" style="margin-top:16px;">${advancedOpen?"▴ 고급 설정 (선택) 접기":"▾ 고급 설정 (선택) — 날짜·시간·지역 제한"}</button>
        <div id="advancedSettings" style="display:${advancedOpen?"block":"none"};">
        <div style="margin-top:10px;">
          <div class="name-label">투표 가능 날짜 범위 (비워두면 제한 없음)</div>
          <div class="card" style="margin-top:6px;padding:14px;">
            <div class="cal-header">
              <button id="rangePrevMonth" type="button">‹</button>
              <div class="cal-title" id="rangeCalTitle">${d.rangeCalYear}년 ${d.rangeCalMonth+1}월</div>
              <button id="rangeNextMonth" type="button">›</button>
            </div>
            <div class="cal-grid" id="rangeCalGrid"></div>
            <div class="cal-hint" id="rangeHint">${d.dateStart||d.dateEnd ? `선택됨: ${d.dateStart||"?"} ~ ${d.dateEnd||"(끝나는 날짜를 눌러주세요)"}` : "시작 날짜를 먼저 누르고, 끝나는 날짜를 눌러주세요."}</div>
            ${(d.dateStart||d.dateEnd) ? `<button id="rangeResetBtn" type="button" class="refresh-link" style="margin-top:6px;">↺ 범위 초기화</button>` : ""}
          </div>
        </div>
        <div style="margin-top:10px;">
          <div class="name-label">투표 가능 시간 범위</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
            <select id="newHourStartInput" style="flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;outline:none;">
              ${Array.from({length:24},(_,h)=>`<option value="${h}" ${String(h)===d.hourStart?"selected":""}>${String(h).padStart(2,"0")}:00</option>`).join("")}
            </select>
            <span style="color:var(--gray);font-size:12px;">부터</span>
            <select id="newHourEndInput" style="flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;outline:none;">
              ${Array.from({length:24},(_,h)=>`<option value="${h}" ${String(h)===d.hourEnd?"selected":""}>${String(h).padStart(2,"0")}:00</option>`).join("")}
            </select>
            <span style="color:var(--gray);font-size:12px;">까지</span>
          </div>
        </div>
        <div style="margin-top:10px;">
          <div class="name-label">투표 가능 지역 (선택 안 하면 전체 지역 허용)</div>
          <div style="max-height:220px;overflow-y:auto;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:4px;">
            ${Object.entries(REGIONS.reduce((acc,r)=>{ (acc[r.area]=acc[r.area]||[]).push(r); return acc; }, {})).map(([area, list])=>`
              <div style="font-size:11px;color:var(--gray);font-weight:700;margin:6px 0 4px;">${area}</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;">
                ${list.map(r=>`
                  <label style="display:flex;align-items:center;gap:4px;background:${d.allowedRegions.includes(r.name)?"var(--primaryLight)":"#F8FAFC"};border:1px solid ${d.allowedRegions.includes(r.name)?"var(--purple)":"var(--line)"};border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;color:${d.allowedRegions.includes(r.name)?"var(--purpleDark)":"var(--gray)"};cursor:pointer;">
                    <input type="checkbox" class="region-restrict-check" data-region="${r.name}" ${d.allowedRegions.includes(r.name)?"checked":""} style="display:none;" />${r.name}
                  </label>
                `).join("")}
              </div>
            `).join("")}
          </div>
          <div id="regionRestrictHint" class="helper" style="margin-top:4px;">${d.allowedRegions.length ? `${d.allowedRegions.length}개 지역만 허용` : "전체 지역 허용"}</div>
        </div>
        </div>
        <button class="submit-btn" id="createBtn" style="margin-top:14px;">모임 만들기</button>
      </div>
      <div class="helper">모임을 만들면 코드가 생성돼요. 이 코드와 이 파일(또는 이 파일을 여는 방법)을 참석자에게 공유하면, 각자 코드를 입력해서 같은 모임에 투표할 수 있어요.</div>
    `;
    document.getElementById("joinCodeInput").addEventListener("input", e=>{ state.landingDraft.joinCode = e.target.value; });
    document.getElementById("advancedToggleBtn").addEventListener("click", ()=>{
      state.landingDraft.advancedOpen = !advancedOpen;
      const box = document.getElementById("advancedSettings");
      const btn = document.getElementById("advancedToggleBtn");
      const nowOpen = state.landingDraft.advancedOpen;
      box.style.display = nowOpen ? "block" : "none";
      btn.textContent = nowOpen ? "▴ 고급 설정 (선택) 접기" : "▾ 고급 설정 (선택) — 날짜·시간·지역 제한";
      if(nowOpen) buildRangeCalendar();
    });
    document.getElementById("newTitleInput").addEventListener("input", e=>{ state.landingDraft.newTitle = e.target.value; });
    document.getElementById("newMembersInput").addEventListener("input", e=>{
      state.landingDraft.newMembers = e.target.value;
      updateMemberCount();
    });
    updateMemberCount();
    document.getElementById("newCodeInput").addEventListener("input", e=>{ state.landingDraft.newCode = e.target.value; });
    buildRangeCalendar();
    document.getElementById("rangePrevMonth").addEventListener("click", ()=>shiftRangeMonth(-1));
    document.getElementById("rangeNextMonth").addEventListener("click", ()=>shiftRangeMonth(1));
    const rangeResetBtn = document.getElementById("rangeResetBtn");
    if(rangeResetBtn) rangeResetBtn.addEventListener("click", ()=>{
      state.landingDraft.dateStart = ""; state.landingDraft.dateEnd = "";
      renderLandingScreen();
    });
    document.getElementById("newHourStartInput").addEventListener("change", e=>{ state.landingDraft.hourStart = e.target.value; });
    document.getElementById("newHourEndInput").addEventListener("change", e=>{ state.landingDraft.hourEnd = e.target.value; });
    document.querySelectorAll(".region-restrict-check").forEach(cb=>{
      cb.addEventListener("change", e=>{
        const region = e.target.dataset.region;
        const idx = state.landingDraft.allowedRegions.indexOf(region);
        if(e.target.checked && idx<0) state.landingDraft.allowedRegions.push(region);
        else if(!e.target.checked && idx>=0) state.landingDraft.allowedRegions.splice(idx,1);
        const label = e.target.closest("label");
        const on = e.target.checked;
        label.style.background = on ? "var(--primaryLight)" : "#F8FAFC";
        label.style.borderColor = on ? "var(--purple)" : "var(--line)";
        label.style.color = on ? "var(--purpleDark)" : "var(--gray)";
        const hint = document.getElementById("regionRestrictHint");
        if(hint) hint.textContent = state.landingDraft.allowedRegions.length ? `${state.landingDraft.allowedRegions.length}개 지역만 허용` : "전체 지역 허용";
      });
    });
    document.getElementById("joinBtn").addEventListener("click", ()=>{
      const code = document.getElementById("joinCodeInput").value.trim();
      if(!code){ state.error="코드를 입력해주세요."; render(); return; }
      joinRoom(code);
    });
    document.getElementById("createBtn").addEventListener("click", ()=>{
      const title = document.getElementById("newTitleInput").value.trim();
      const membersRaw = document.getElementById("newMembersInput").value;
      const code = document.getElementById("newCodeInput").value.trim();
      const dateStart = state.landingDraft.dateStart;
      const dateEnd = state.landingDraft.dateEnd;
      const hourStart = parseInt(document.getElementById("newHourStartInput").value, 10);
      const hourEnd = parseInt(document.getElementById("newHourEndInput").value, 10);
      const members = membersRaw.split("\n").map(s=>s.trim()).filter(Boolean);
      if(!title){ state.error="모임 이름을 입력해주세요."; render(); return; }
      if(members.length<1){ state.error="참석자를 최소 1명 입력해주세요."; render(); return; }
      if(!/^[A-Za-z0-9가-힣_-]{2,40}$/.test(code)){ state.error="코드는 2~40자의 영문/숫자/한글로 입력해주세요."; render(); return; }
      if(dateStart && dateEnd && dateStart > dateEnd){ state.error="투표 가능 날짜의 시작일이 종료일보다 늦어요."; render(); return; }
      if(hourEnd <= hourStart){ state.error="투표 가능 시간의 종료 시각이 시작 시각보다 늦어야 해요."; render(); return; }
      const allowedRegions = state.landingDraft.allowedRegions.slice();
      createRoom(code, title, members, dateStart, dateEnd, hourStart, hourEnd, allowedRegions);
    });
  }

  // If the room restricts voting to a date range, open the calendar on the range's
  // start month (otherwise a room set for e.g. August would open on "today"'s month
  // with every single day disabled, which looks exactly like a broken calendar).
  function initialCalMonth(cfg){
    if(cfg && cfg.dateStart){
      const [y,m] = cfg.dateStart.split("-").map(Number);
      return { year: y, month: m-1 };
    }
    return { year: TODAY.getFullYear(), month: TODAY.getMonth() };
  }

  async function joinRoom(rawCode){
    const code = rawCode.trim().toLowerCase();
    state.error=""; state.loading=true; render();
    try{
      const res = await fetch(`${DB_URL}/rooms/${encodeURIComponent(code)}/config.json?_=${Date.now()}`, { cache: "no-store" });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const config = await res.json();
      if(!config){
        state.loading=false;
        state.error = "존재하지 않는 코드예요. 코드를 다시 확인하거나 새 모임을 만들어주세요.";
        render();
        return;
      }
      state.roomCode = code;
      state.roomConfig = config;
      state.currentUser = "";
      state.screen = "vote";
      const icm = initialCalMonth(config);
      state.calYear = icm.year; state.calMonth = icm.month;
      state.landingDraft = { joinCode: "", newTitle: "", newMembers: "", newCode: "", dateStart: "", dateEnd: "", hourStart: "10", hourEnd: "21", rangeCalYear: TODAY.getFullYear(), rangeCalMonth: TODAY.getMonth(), allowedRegions: [] };
      await loadAllVotes();
    }catch(e){
      state.loading=false;
      state.error = "접속에 실패했어요. 인터넷 연결을 확인하고 다시 시도해주세요. (" + (e && e.message || e) + ")";
      render();
    }
  }

  async function createRoom(rawCode, title, members, dateStart, dateEnd, hourStart, hourEnd, allowedRegions){
    const code = rawCode.trim().toLowerCase();
    state.error=""; state.loading=true; render();
    try{
      const checkRes = await fetch(`${DB_URL}/rooms/${encodeURIComponent(code)}/config.json?_=${Date.now()}`, { cache: "no-store" });
      const existing = checkRes.ok ? await checkRes.json() : null;
      if(existing){
        state.loading=false;
        state.error = "이미 사용 중인 코드예요. 다른 코드를 입력해주세요.";
        render();
        return;
      }
      const config = {
        title, members,
        dateStart: dateStart || null,
        dateEnd: dateEnd || null,
        hourStart: Number.isInteger(hourStart) ? hourStart : 10,
        hourEnd: Number.isInteger(hourEnd) ? hourEnd : 21,
        allowedRegions: (allowedRegions && allowedRegions.length) ? allowedRegions : null,
        createdAt: new Date().toISOString(),
      };
      const res = await fetch(`${DB_URL}/rooms/${encodeURIComponent(code)}/config.json`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(config),
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      state.roomCode = code;
      state.roomConfig = config;
      state.currentUser = "";
      state.screen = "created";
      const icm = initialCalMonth(config);
      state.calYear = icm.year; state.calMonth = icm.month;
      state.landingDraft = { joinCode: "", newTitle: "", newMembers: "", newCode: "", dateStart: "", dateEnd: "", hourStart: "10", hourEnd: "21", rangeCalYear: TODAY.getFullYear(), rangeCalMonth: TODAY.getMonth(), allowedRegions: [] };
      loadAllVotes();
    }catch(e){
      state.loading=false;
      state.error = "모임 생성에 실패했어요. 다시 시도해주세요. (" + (e && e.message || e) + ")";
      render();
    }
  }

  async function copyToClipboard(text){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch(e){
      try{
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      }catch(e2){
        return false;
      }
    }
  }

  async function copyCodeWithFeedback(text, btnEl){
    const ok = await copyToClipboard(text);
    if(!btnEl) return;
    const prev = btnEl.textContent;
    btnEl.textContent = ok ? "✓ 복사됨!" : "복사 실패, 직접 선택해주세요";
    setTimeout(()=>{ btnEl.textContent = prev; }, 1600);
  }

  function buildInviteText(){
    const title = state.roomConfig ? state.roomConfig.title : "일정 투표";
    return `[일정 투표] ${title}\n아래 코드로 입장해서 투표해주세요!\n모임 코드: ${state.roomCode}\n${location.href}`;
  }

  function buildFinalizedText(){
    const title = state.roomConfig ? state.roomConfig.title : "일정 투표";
    const f = state.finalized;
    if(!f) return null;
    return `[확정된 일정] ${title}\n📅 ${fmtLabel(f.date)}(${weekdayOf(f.date)}) ${f.time}` +
      (f.region ? `\n📍 ${f.region}` : "") +
      (f.count ? `\n👥 참여 인원 ${f.count}명` : "") +
      `\n\n자세히 보기: ${location.href}\n모임 코드: ${state.roomCode}`;
  }

  function buildSummaryText(){
    const title = state.roomConfig ? state.roomConfig.title : "일정 투표";
    const votedNames = Object.keys(state.allVotes);
    if(!votedNames.length) return null;
    const combos = computeComboList();
    if(!combos.length) return null;
    const medals = ["🥇","🥈","🥉"];
    const top3 = combos.slice(0,3).map((c,i)=>{
      const topRegion = regionCountsAmong(c.names)[0];
      return `${medals[i]} ${i+1}순위: ${fmtLabel(c.date)}(${weekdayOf(c.date)}) ${c.time} · 가능 인원 ${c.count}명` +
        (topRegion ? ` · 선호지역 ${topRegion.region}` : "");
    }).join("\n");
    return `[일정 투표 현황] ${title}\n${top3}\n\n아직 투표 안 하셨다면 참여해주세요: ${location.href}\n모임 코드: ${state.roomCode}`;
  }

  async function captureResultsCanvas(){
    const el = document.getElementById("resultsCapture");
    if(!el || typeof html2canvas === "undefined") return null;
    return await html2canvas(el, { backgroundColor: "#F8FAFC", scale: 2, useCORS: true });
  }

  function fileNameSafe(str){
    return (str||"일정투표").replace(/[\\/:*?"<>|]/g,"").slice(0,40);
  }

  function triggerDownload(dataUrl, filename){
    const a = document.createElement("a");
    a.href = dataUrl; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
  }

  async function saveResultsAsImage(btnEl){
    const prev = btnEl.textContent;
    btnEl.textContent = "저장 중...";
    try{
      const canvas = await captureResultsCanvas();
      if(!canvas) throw new Error("캡처 실패");
      const title = state.roomConfig ? state.roomConfig.title : "일정투표";
      triggerDownload(canvas.toDataURL("image/png"), `${fileNameSafe(title)}_결과.png`);
      btnEl.textContent = "✓ 저장됨!";
    }catch(e){
      btnEl.textContent = "저장 실패";
    }
    setTimeout(()=>{ if(document.body.contains(btnEl)) btnEl.textContent = prev; }, 1600);
  }

  async function saveResultsAsPDF(btnEl){
    const prev = btnEl.textContent;
    btnEl.textContent = "저장 중...";
    try{
      const canvas = await captureResultsCanvas();
      if(!canvas || typeof window.jspdf === "undefined") throw new Error("캡처 실패");
      const { jsPDF } = window.jspdf;
      const imgW = canvas.width, imgH = canvas.height;
      const pdf = new jsPDF({ orientation: imgH>imgW?"p":"l", unit: "px", format: [imgW, imgH] });
      pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, 0, imgW, imgH);
      const title = state.roomConfig ? state.roomConfig.title : "일정투표";
      pdf.save(`${fileNameSafe(title)}_결과.pdf`);
      btnEl.textContent = "✓ 저장됨!";
    }catch(e){
      btnEl.textContent = "저장 실패";
    }
    setTimeout(()=>{ if(document.body.contains(btnEl)) btnEl.textContent = prev; }, 1600);
  }

  // Captures the results summary as an image and hands it to the OS share sheet directly
  // (so apps like KakaoTalk receive the actual picture, not just text) when supported;
  // otherwise falls back to just downloading the image so the person can share it manually.
  async function shareResultsImage(btnEl){
    const prev = btnEl ? btnEl.textContent : null;
    if(btnEl) btnEl.textContent = "이미지 준비 중...";
    try{
      const canvas = await captureResultsCanvas();
      if(!canvas) throw new Error("캡처 실패");
      const title = state.roomConfig ? state.roomConfig.title : "일정 투표";
      const blob = await new Promise(res=>canvas.toBlob(res, "image/png"));
      const file = new File([blob], `${fileNameSafe(title)}_결과.png`, { type: "image/png" });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ title: "일정 투표 결과 - " + title, files: [file] });
        if(btnEl) btnEl.textContent = prev;
        closeShareMenu();
        return;
      }
      // fallback: can't hand a file to a share sheet here, so just save it for manual sharing
      triggerDownload(URL.createObjectURL(blob), `${fileNameSafe(title)}_결과.png`);
      if(btnEl) btnEl.textContent = "✓ 이미지 저장됨 (직접 공유해주세요)";
    }catch(e){
      if(e && e.name === "AbortError"){ if(btnEl) btnEl.textContent = prev; return; }
      if(btnEl) btnEl.textContent = "실패";
    }
    setTimeout(()=>{ if(btnEl && document.body.contains(btnEl)) btnEl.textContent = prev; }, 2200);
  }

  async function handleSend(kind, btnEl){
    let text;
    if(kind==="invite") text = buildInviteText();
    else if(kind==="finalized") text = buildFinalizedText();
    else if(kind==="summary") text = buildSummaryText();
    if(!text) return;
    const title = state.roomConfig ? state.roomConfig.title : "일정 투표";
    if(navigator.share){
      try{
        await navigator.share({ title: "일정 투표 - " + title, text });
        closeShareMenu();
        return;
      }catch(e){
        if(e && e.name === "AbortError") return; // user cancelled the OS app picker, keep the sheet open
        // anything else (not supported, permission issue, etc.) -> fall through to the manual chooser below
      }
    }
    showFallbackChooser(btnEl, text);
  }

  function showFallbackChooser(btnEl, text){
    const row = btnEl.closest(".pick-btn");
    if(!row) return;
    let fallback = row.querySelector(".fallback-row");
    if(fallback){ fallback.remove(); return; } // tap again to collapse
    const encoded = encodeURIComponent(text);
    fallback = document.createElement("div");
    fallback.className = "fallback-row";
    fallback.style.cssText = "display:flex;gap:6px;margin-top:10px;width:100%;";
    fallback.innerHTML = `
      <a href="sms:?body=${encoded}" style="flex:1;text-align:center;background:#F1F5F9;color:var(--ink);font-size:11px;font-weight:700;padding:9px 0;border-radius:10px;text-decoration:none;">💬 문자</a>
      <a href="mailto:?body=${encoded}" style="flex:1;text-align:center;background:#F1F5F9;color:var(--ink);font-size:11px;font-weight:700;padding:9px 0;border-radius:10px;text-decoration:none;">📧 메일</a>
      <button type="button" class="fallback-copy" style="flex:1;background:#F1F5F9;color:var(--ink);font-size:11px;font-weight:700;padding:9px 0;border-radius:10px;border:none;cursor:pointer;">📋 복사</button>
    `;
    row.appendChild(fallback);
    fallback.querySelector(".fallback-copy").addEventListener("click", async ()=>{
      const ok = await copyToClipboard(text);
      const copyBtn = fallback.querySelector(".fallback-copy");
      copyBtn.textContent = ok ? "✓ 복사됨" : "복사 실패";
      setTimeout(()=>{ if(document.body.contains(copyBtn)) copyBtn.textContent = "📋 복사"; }, 1400);
    });
  }

  function closeShareMenu(){
    const overlay = document.getElementById("shareOverlay");
    if(overlay) overlay.remove();
  }

  function openShareMenu(){
    closeShareMenu();
    const hasFinalized = !!state.finalized;
    const hasVotes = Object.keys(state.allVotes).length > 0;
    const canShareImage = state.screen === "results" && hasVotes;
    const sendBtn = (kind, enabled, label) => enabled
      ? `<button type="button" class="share-send-btn" data-kind="${kind}">📤 ${label||"보내기"}</button>`
      : `<span style="color:var(--gray);font-size:11px;font-weight:700;">${kind==="finalized"?"아직 없음":kind==="image"?"결과보기 탭에서":"투표 없음"}</span>`;
    const overlay = document.createElement("div");
    overlay.id = "shareOverlay";
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(17,24,39,.45);z-index:1000;display:flex;align-items:flex-end;justify-content:center;";
    overlay.innerHTML = `

  const TIME_BUCKETS = {
    morning: ["10:00","11:00","12:00","13:00"],
    afternoon: ["14:00","15:00","16:00","17:00"],
    evening: ["18:00","19:00","20:00","21:00"],
  };
  function clippedBucket(part){
    const avail = new Set(getTimes());
    return (TIME_BUCKETS[part]||[]).filter(t=>avail.has(t));
  }

  function getQuickTargets(kind){
    const [dayType, part] = kind.split("-");
    const times = clippedBucket(part);
    const y = state.calYear, m = state.calMonth;
    const daysInMonth = new Date(y,m+1,0).getDate();
    const targetKeys = [];
    for(let d=1; d<=daysInMonth; d++){
      const dateObj = new Date(y,m,d);
      if(!isDateSelectable(dateObj)) continue;
      const wd = dateObj.getDay();
      const isWeekend = (wd===0 || wd===6);
      if((dayType==="weekend") === isWeekend){ targetKeys.push(dkey(y,m,d)); }
    }
    return { dayType, part, targetKeys, times };
  }

  function refreshQuickButtons(){
    document.querySelectorAll(".quick-btn").forEach(b=>{
      b.classList.toggle("active", state.quickActive.has(b.dataset.quick));
    });
  }

  // Each quick button tracks its own explicit on/off state (state.quickActive),
  // so turning one on never visually activates another button just because
  // they happen to share the same weekday/weekend date range.
  function applyQuickPreset(kind){
    const { dayType, part, targetKeys, times } = getQuickTargets(kind);
    const turningOn = !state.quickActive.has(kind);

    if(turningOn){
      state.quickActive.add(kind);
      const dset = new Set(state.draft.dates); targetKeys.forEach(k=>dset.add(k));
      state.draft.dates = Array.from(dset).sort();
      const tset = new Set(state.draft.times); times.forEach(t=>tset.add(t));
      state.draft.times = Array.from(tset);
    }else{
      state.quickActive.delete(kind);
      // only remove a date if no other currently-active button of the same day type still needs it
      const siblingDayTypeActive = Array.from(state.quickActive).some(k=>k.startsWith(dayType+"-"));
      if(!siblingDayTypeActive){
        state.draft.dates = state.draft.dates.filter(k=>!targetKeys.includes(k));
      }
      // only remove a time slot if no other currently-active button uses the same time-of-day part
      const siblingPartActive = Array.from(state.quickActive).some(k=>k.endsWith("-"+part));
      if(!siblingPartActive){
        state.draft.times = state.draft.times.filter(t=>!times.includes(t));
      }
    }
    state.saved = false;
    buildCalendar();
    document.querySelectorAll("#timeGrid .time-cell").forEach(cell=>{
      cell.classList.toggle("active", state.draft.times.includes(cell.dataset.time));
    });
    refreshQuickButtons();
    updateCalHint();
    refreshDynamicUI();
  }

  function shiftMonth(delta){
    let m = state.calMonth + delta, y = state.calYear;
    if(m<0){m=11;y--;} if(m>11){m=0;y++;}
    state.calMonth=m; state.calYear=y;
    const title = document.getElementById("calTitle");
    if(title) title.textContent = `${state.calYear}년 ${state.calMonth+1}월`;
    state.quickActive.clear();
    buildCalendar();
    refreshQuickButtons();
  }

  function goToToday(){
    state.calYear = TODAY.getFullYear();
    state.calMonth = TODAY.getMonth();
    const title = document.getElementById("calTitle");
    if(title) title.textContent = `${state.calYear}년 ${state.calMonth+1}월`;
    state.quickActive.clear();
    buildCalendar();
    refreshQuickButtons();
  }

  function isDateSelectable(dateObj){
    if(dateObj < TODAY) return false;
    const cfg = state.roomConfig;
    if(cfg && cfg.dateStart){
      const [sy,sm,sd] = cfg.dateStart.split("-").map(Number);
      if(dateObj < new Date(sy, sm-1, sd)) return false;
    }
    if(cfg && cfg.dateEnd){
      const [ey,em,ed] = cfg.dateEnd.split("-").map(Number);
      if(dateObj > new Date(ey, em-1, ed)) return false;
    }
    return true;
  }

  function buildCalendar(){
    const grid = document.getElementById("calGrid");
    if(!grid) return;
    const y = state.calYear, m = state.calMonth;
    const firstDay = new Date(y,m,1).getDay();
    const daysInMonth = new Date(y,m+1,0).getDate();
    let html = WD.map(w=>`<div class="cal-wd">${w}</div>`).join("");
    for(let i=0;i<firstDay;i++) html += `<div class="cal-day empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const key = dkey(y,m,d);
      const dateObj = new Date(y,m,d);
      const isPast = !isDateSelectable(dateObj);
      const selected = state.draft.dates.includes(key);
      const isToday = dateObj.getTime() === TODAY.getTime();
      const todayStyle = isToday ? `box-shadow:inset 0 0 0 2px ${selected?'#fff':'var(--purple)'};` : "";
      html += `<div class="cal-day ${isPast?"disabled":""} ${selected?"selected":""}" data-key="${key}" data-past="${isPast}" style="${todayStyle}">${d}</div>`;
    }
    grid.innerHTML = html;
    grid.querySelectorAll(".cal-day:not(.empty):not(.disabled)").forEach(cell=>{
      cell.addEventListener("click", ()=>{
        const key = cell.dataset.key;
        const idx = state.draft.dates.indexOf(key);
        if(idx>=0) state.draft.dates.splice(idx,1); else state.draft.dates.push(key);
        state.draft.dates.sort();
        state.saved = false;
        cell.classList.toggle("selected");
        updateCalHint();
        refreshQuickButtons();
        refreshDynamicUI();
      });
    });
  }

  function applyPreset(kind){
    if(kind==="clear"){ state.draft.times=[]; }
    else{
      const set = new Set(state.draft.times);
      clippedBucket(kind).forEach(t=>set.add(t));
      state.draft.times = Array.from(set);
    }
    state.saved = false;
    document.querySelectorAll("#timeGrid .time-cell").forEach(cell=>{
      cell.classList.toggle("active", state.draft.times.includes(cell.dataset.time));
    });
    refreshQuickButtons();
    refreshDynamicUI();
  }

  function buildTimeGrid(){
    const grid = document.getElementById("timeGrid");
    if(!grid) return;
    let dragging = false, mode = "select";
    const applyTo = (cell)=>{
      const t = cell.dataset.time;
      const has = state.draft.times.includes(t);
      if(mode==="select" && !has){ state.draft.times.push(t); cell.classList.add("active"); state.saved=false; refreshQuickButtons(); refreshDynamicUI(); }
      else if(mode==="deselect" && has){ state.draft.times = state.draft.times.filter(x=>x!==t); cell.classList.remove("active"); state.saved=false; refreshQuickButtons(); refreshDynamicUI(); }
    };
    grid.querySelectorAll(".time-cell").forEach(cell=>{
      cell.addEventListener("pointerdown", (e)=>{
        e.preventDefault();
        dragging = true;
        mode = state.draft.times.includes(cell.dataset.time) ? "deselect" : "select";
        applyTo(cell);
      });
    });
    grid.addEventListener("pointermove", (e)=>{
      if(!dragging) return;
      const elAt = document.elementFromPoint(e.clientX, e.clientY);
      if(elAt && elAt.classList && elAt.classList.contains("time-cell")) applyTo(elAt);
    });
    window.addEventListener("pointerup", ()=>{ dragging=false; });
  }

  function updateCalHint(){
    const hint = document.querySelector(".cal-hint");
    if(hint) hint.textContent = "선택됨: " + (state.draft.dates.length===0?"없음":state.draft.dates.map(d=>fmtLabel(d)).join(", "));
  }

  function refreshDynamicUI(){
    const btn = document.getElementById("submitBtn");
    if(btn){
      const disabled = state.saving || state.draft.dates.length===0 || state.draft.times.length===0 || !isPinValid();
      btn.disabled = disabled;
      btn.textContent = state.saving ? "저장 중..." : (state.saved ? "✓ 투표 완료" : "투표하기");
      btn.classList.toggle("saved", !!state.saved);
    }
    const body = document.getElementById("screen-body");
    const shouldShowHelper = state.draft.dates.length===0 || state.draft.times.length===0;
    const voteForm = document.getElementById("voteFormBody");
    let helperEl = document.querySelector(".dt-helper");
    if(shouldShowHelper && !helperEl && voteForm){
      helperEl = document.createElement("div");
      helperEl.className = "helper dt-helper";
      helperEl.textContent = "날짜와 시간을 최소 1개씩 선택해주세요";
      voteForm.appendChild(helperEl);
    } else if(!shouldShowHelper && helperEl){
      helperEl.remove();
    }
  }

  function buildMap(){
    const el = document.getElementById("mapbox");
    if(!el || typeof L === "undefined") return;
    const map = L.map(el, { zoomControl:true, scrollWheelZoom:false }).setView([37.52, 127.15], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors', maxZoom: 18
    }).addTo(map);

    const makeIcon = (isSelected, name) => L.divIcon({
      className: "",
      html: `<div style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <div style="width:${isSelected?14:10}px;height:${isSelected?14:10}px;border-radius:50%;background:${isSelected?'#D97706':'#94A3B8'};border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35);flex:none;"></div>
        <div style="background:#fff;border:1px solid ${isSelected?'#D97706':'var(--line)'};border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700;color:${isSelected?'#D97706':'var(--ink)'};box-shadow:0 1px 2px rgba(0,0,0,.12);white-space:nowrap;">${name}</div>
      </div>`,
      iconSize: [110, 20], iconAnchor: [7, 10],
    });

    const clusterGroup = typeof L.markerClusterGroup === "function"
      ? L.markerClusterGroup({ maxClusterRadius: 40, spiderfyOnMaxZoom: true, disableClusteringAtZoom: 12 })
      : L.layerGroup();

    const cfg = state.roomConfig;
    const allowedSet = (cfg && cfg.allowedRegions && cfg.allowedRegions.length) ? new Set(cfg.allowedRegions) : null;
    const visibleRegions = allowedSet ? REGIONS.filter(r=>allowedSet.has(r.name)) : REGIONS;

    state.markers = {};
    visibleRegions.forEach(r=>{
      const isSelected = state.draft.regions.includes(r.name);
      const marker = L.marker([r.lat, r.lng], { icon: makeIcon(isSelected, r.name) });
      marker.on("click", ()=>{
        const idx = state.draft.regions.indexOf(r.name);
        if(idx>=0) state.draft.regions.splice(idx,1); else state.draft.regions.push(r.name);
        state.saved = false;
        visibleRegions.forEach(rr=>{
          const m = state.markers[rr.name];
          if(m) m.setIcon(makeIcon(state.draft.regions.includes(rr.name), rr.name));
        });
        const label = document.querySelector(".region-picked");
        if(label) label.textContent = state.draft.regions.length ? `선택됨: ${state.draft.regions.join(", ")}` : "지도의 마커를 눌러 지역을 선택해주세요";
        refreshDynamicUI();
      });
      clusterGroup.addLayer(marker);
      state.markers[r.name] = marker;
    });
    map.addLayer(clusterGroup);
    setTimeout(()=>map.invalidateSize(), 150);
  }

  function renderStatCard(votedCount, total){
    const pct = total>0 ? Math.round((votedCount/total)*100) : 0;
    const r = 32, circumference = 2*Math.PI*r;
    const offset = circumference - (pct/100)*circumference;
    const notVotedCount = Math.max(0, total - votedCount);
    return `
      <div class="stat-hero">
        <div style="display:flex;align-items:center;gap:14px;">
          <div class="stat-icon">👥</div>
          <div>

            <div class="val">${total}명 중 ${votedCount}명 참여</div>
            <div class="stat-legend">
              <span><span class="stat-dot" style="background:var(--purple);"></span>참여 완료 ${votedCount}명</span>
              <span><span class="stat-dot" style="background:#D1D5DB;"></span>미참여 ${notVotedCount}명</span>
            </div>
          </div>
        </div>
        <div class="ring-wrap">
          <div style="position:relative;width:78px;height:78px;">
            <svg width="78" height="78" viewBox="0 0 78 78">
              <circle cx="39" cy="39" r="${r}" fill="none" stroke="#E5E7EB" stroke-width="7"/>
              <circle cx="39" cy="39" r="${r}" fill="none" stroke="#D97706" stroke-width="7" stroke-linecap="round"
                stroke-dasharray="${circumference.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" transform="rotate(-90 39 39)"/>
            </svg>
            <div class="ring-pct">${pct}%</div>
          </div>
          <div class="ring-caption">참여율</div>

    `;

  // ---------- RESULTS SCREEN ----------

      `;
      return;
    }

    // unique dates across all votes
    const dateSet = new Set();
    votedNames.forEach(n => (state.allVotes[n].dates||[]).forEach(d=>dateSet.add(d)));

    const namesFor = (predicate) => votedNames.filter(predicate);

    }).sort((a,b)=>b.count-a.count);

    const times = getTimes();
    const timeCounts = times.map(t => {
      const names = namesFor(n => (state.allVotes[n].times||[]).includes(t));
      return { time: t, count: names.length, names };
    }).sort((a,b)=>b.count-a.count);

    const allRegionCounts = REGIONS.map(r => {
      const names = namesFor(n => {
        const v = state.allVotes[n];
        return v.regions ? v.regions.includes(r.name) : v.region === r.name;
      });
      return { region: r.name, count: names.length, names };
    }).sort((a,b)=>b.count-a.count);

    const topCombos = comboList.slice(0,3);

    let heatMax = 1;

      </div>

      <div class="section-label" style="justify-content:space-between;">
        <span>${ci("star")} 추천 일정 (1~3순위)</span>
        <span style="font-size:11px;color:var(--gray);font-weight:600;">❓ 추천 기준: 가장 많이 겹치는 순</span>
      </div>
      ${topCombos.length===0 ? `<div class="rec-card"><div class="rec-sub">겹치는 날짜·시간이 아직 없어요.</div></div>` : topCombos.map((c,i)=>{
        const comboRegions = regionCountsAmong(c.names);
        const notAvailable = votedNames.filter(n => !c.names.includes(n));
        return `
        <div class="rec-card" style="margin-bottom:10px;">
          <div style="display:flex;gap:14px;align-items:flex-start;">
            <div style="font-size:30px;line-height:1;flex:none;">${medals[i]}</div>
            <div style="flex:1;min-width:0;">
              <div class="rec-main">
                <span class="rec-date">${fmtLabel(c.date)} (${weekdayOf(c.date)})</span>
                <span class="rec-time">${c.time}</span>

              <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
                <span style="background:#fff;border:1px solid var(--purple);color:var(--purpleDark);font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">👤 모두 가능한 인원 ${c.count}명</span>
                <span style="background:#fff;border:1px solid var(--purple);color:var(--purpleDark);font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;">📍 선호 지역 ${comboRegions.length}개</span>

      <div>${collapsibleSection("combo-list", comboList.map((c,i)=>barRow(`${fmtLabel(c.date)}(${weekdayOf(c.date)}) ${c.time}`, c.count, total, i, "var(--purple)", c.names)))}</div>

      <div class="card">
        <div id="resultMapbox"></div>
      </div>
      <div class="section-label">전체 순위 (${allRegionCounts.length}개)</div>
      <div>${collapsibleSection("region-list", allRegionCounts.map((r,i)=>barRow(r.region, r.count, total, i, "var(--purpleDark)", r.names)))}</div>

      <div class="section-label">🗓 날짜 × 시간 히트맵</div>
      <div class="card">
        <div class="heatmap-wrap">
          <div class="heatmap-hdr"><div class="heatmap-date" style="background:#fff;"></div>${times.map(t=>`<div class="heatmap-hcell">${t.slice(0,2)}</div>`).join("")}</div>
          ${dateList.map(dk=>{
            const cells = times.map(t=>{
              const c = votedNames.filter(n => (state.allVotes[n].dates||[]).includes(dk) && (state.allVotes[n].times||[]).includes(t)).length;
              const op = c===0 ? 1 : 0.25 + (c/heatMax)*0.75;
              const bg = c===0 ? "#FEF3C7" : "#D97706";
              const col = c===0 ? "#92400E" : "#451A03";
              return `<div class="heatmap-cell" style="background:${bg};opacity:${op};color:${col};">${c>0?c:""}</div>`;
            }).join("");
            return `<div class="heatmap-row"><div class="heatmap-date">${fmtLabel(dk)}</div>${cells}</div>`;

    document.querySelectorAll(".rec-toggle").forEach(btn=>{

        const isHidden = extra.style.display === "none";
        extra.style.display = isHidden ? "block" : "none";

    ["combo-list","date-list","time-list","region-list"].forEach(wireCollapsible);
    document.getElementById("saveImageBtn").addEventListener("click", (e)=>saveResultsAsImage(e.currentTarget));

  function collapsibleSection(id, rowsHtml, visibleCount){
    visibleCount = visibleCount || 5;
    const visible = rowsHtml.slice(0, visibleCount).join("");
    const rest = rowsHtml.slice(visibleCount);
    if(rest.length === 0) return visible;
    return `
      ${visible}
      <div id="${id}-extra" style="display:none;">${rest.join("")}</div>
      <button id="${id}-toggle" class="refresh-link" style="margin:6px auto 0;display:flex;justify-content:center;width:100%;">더 보기 (${rest.length}개) ▾</button>
    `;
  }

  function wireCollapsible(id){
    const btn = document.getElementById(id+"-toggle");
    const extra = document.getElementById(id+"-extra");
    if(!btn || !extra) return;
    const total = extra.children.length;
    btn.addEventListener("click", ()=>{
      const isHidden = extra.style.display === "none";
      extra.style.display = isHidden ? "block" : "none";
      btn.textContent = isHidden ? "접기 ▴" : `더 보기 (${total}개) ▾`;
    });
  }

  function shortRegionName(name){
    return name.replace(/(구|시|군)$/,"");
  }

  function buildResultsMap(allRegionCounts){
    const el = document.getElementById("resultMapbox");
    if(!el || typeof L === "undefined") return;
    const map = L.map(el, { zoomControl:true, scrollWheelZoom:false }).setView([37.52, 127.15], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors', maxZoom: 18
    }).addTo(map);

    const countByName = {};
    allRegionCounts.forEach(r=>{ countByName[r.region] = r.count; });
    const maxCount = Math.max(1, ...allRegionCounts.map(r=>r.count));

    const layerGroup = L.layerGroup();

    let anyVoted = false;
    REGIONS.forEach(r=>{
      const count = countByName[r.name] || 0;
      if(count === 0) return; // only plot regions that actually received votes
      anyVoted = true;
      const intensity = count / maxCount;
      const bg = count === maxCount ? "#15803D" : "#D97706";
      const icon = L.divIcon({
        className: "",
        html: `<div style="display:flex;align-items:center;justify-content:center;background:${bg};color:${bg==='#D97706'?'#451A03':'#fff'};border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);border:2px solid #fff;opacity:${0.55+intensity*0.45};">${shortRegionName(r.name)} ${count}명</div>`,
        iconSize: null,
      });
      const marker = L.marker([r.lat, r.lng], { icon });
      layerGroup.addLayer(marker);
    });
    map.addLayer(layerGroup);

    if(!anyVoted){
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--gray);font-size:13px;">아직 지역을 선택한 투표가 없어요.</div>';
      return;
    }
    setTimeout(()=>map.invalidateSize(), 150);
  }

  function barRow(label, count, total, rank, color, names){
    const pct = total>0 ? Math.round(count/total*100) : 0;
    return `
      <div class="bar-row-wrap">
        <div class="bar-row">
          <div class="bar-rank ${rank===0?'top':''}">${rank+1}</div>
          <div class="bar-label">${label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
          <div class="bar-count">${count}명</div>
        </div>
        ${names && names.length ? `<div class="bar-names">${names.join(", ")}</div>` : ""}
      </div>
    `;
  }

  // ---------- ADMIN SCREEN ----------
  // Looks at the current best (or finalized) date+time and finds anyone who is "one adjustment away"
  // from making it work, so the admin gets a concrete, actionable suggestion instead of just raw numbers.
  function computeSmartSuggestion(){
    const members = (state.roomConfig && state.roomConfig.members) || [];
    const votedNames = Object.keys(state.allVotes);
    const total = members.length;
    if(votedNames.length===0 || total===0) return null;

    let refDate, refTime;
    if(state.finalized){ refDate = state.finalized.date; refTime = state.finalized.time; }
    else{
      const combos = computeComboList();
      if(combos.length===0) return null;
      refDate = combos[0].date; refTime = combos[0].time;
    }

    const currentNames = votedNames.filter(n => (state.allVotes[n].dates||[]).includes(refDate) && (state.allVotes[n].times||[]).includes(refTime));
    const missingVoted = votedNames.filter(n => !currentNames.includes(n));
    const missingNotVoted = members.filter(m => !votedNames.includes(m));

    const nearMiss = missingVoted.map(n=>{
      const v = state.allVotes[n];
      const hasDate = (v.dates||[]).includes(refDate);
      const hasTime = (v.times||[]).includes(refTime);
      let gap = null;
      if(hasDate && !hasTime) gap = "time";
      else if(!hasDate && hasTime) gap = "date";
      return { name: n, gap };
    }).filter(c=>c.gap);

    const pct = Math.round((currentNames.length/total)*100);
    let suggestion;
    if(currentNames.length===total){
      suggestion = "이미 전원이 참여 가능한 최고의 일정이에요! 🎉";
    }else if(nearMiss.length>0){
      const pick = nearMiss[0];
      const newCount = currentNames.length+1;
      const newPct = Math.round((newCount/total)*100);
      const gapLabel = pick.gap==="time" ? `${refTime} 외에 다른 시간도` : `${fmtLabel(refDate)} 외에 다른 날짜도`;
      suggestion = `💡 <b>${pick.name}</b>님이 ${gapLabel} 가능하다면, 참여율이 ${currentNames.length}/${total}명(${pct}%) → ${newCount}/${total}명(${newPct}%)로 올라가요.`;
    }else if(missingNotVoted.length>0){
      suggestion = `아직 투표 안 한 ${missingNotVoted.join(", ")}님이 참여하면 더 정확한 결과를 볼 수 있어요.`;
    }else{
      suggestion = "현재로선 한 사람만 조정해서 참여율을 높일 뾰족한 방법은 안 보여요. 안 되는 분들의 일정이 서로 다른 날짜·시간과 겹쳐요.";
    }

    return { refDate, refTime, count: currentNames.length, total, pct, suggestion };
  }

  function renderAdminScreen(){
    const body = document.getElementById("screen-body");
    if(!body) return;
    const members = (state.roomConfig && state.roomConfig.members) || [];
    const adminName = members[0];
    if(state.currentUser !== adminName){
      body.innerHTML = `
        <div class="card gate">
          <svg class="char-icon" style="width:44px;height:44px;" aria-hidden="true"><use href="#ci-lock"></use></svg>
          <div class="t">${adminName||"관리자"}님만 볼 수 있는 화면입니다.</div>
          <div class="s">투표 화면에서 내 이름을 '${adminName||"-"}'(으)로 선택하면 볼 수 있어요.</div>
        </div>
      `;
      return;
    }
    const votedCount = Object.keys(state.allVotes).length;
    const notVoted = members.filter(m => !(state.allVotes[m] && state.allVotes[m].submittedAt));
    body.innerHTML = `
      <div class="admin-top">
        <div style="font-size:13px;font-weight:700;">투표 현황 (${votedCount}/${members.length})</div>
        <button class="refresh-link" id="refreshBtn">⟳ 새로고침</button>
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        ${members.map(m=>{
          const voted = !!(state.allVotes[m] && state.allVotes[m].submittedAt);
          return `<div class="admin-row"><span style="font-size:14px;font-weight:600;">${m}</span>${voted?`<span class="voted">✓ 투표완료</span>`:`<span class="notvoted">미투표</span>`}</div>`;
        }).join("")}
      </div>
      ${notVoted.length? `<div class="missing-box">아직 투표 안 한 사람: ${notVoted.join(", ")}</div>` : ""}

      <div class="section-label">일정 확정하기</div>
      ${state.finalized ? `
        <div class="finalize-banner">
          <div class="t">${ci("check")} 확정된 일정</div>
          <div class="m">${fmtLabel(state.finalized.date)} (${weekdayOf(state.finalized.date)}) ${state.finalized.time}</div>
          ${(state.finalized.region || state.finalized.count) ? `<div class="s">${state.finalized.region?`📍 ${state.finalized.region}`:""}${(state.finalized.region && state.finalized.count)?" · ":""}${state.finalized.count?`👥 ${state.finalized.count}명`:""}</div>` : ""}
          <div class="s">모든 화면 상단에 이 일정이 참석자들에게 표시돼요.</div>
        </div>
        <button class="submit-btn" id="unfinalizeBtn" style="background:#fff;color:var(--red);border:1px solid var(--red);box-shadow:none;margin-top:0;">확정 취소하기</button>
      ` : (() => {
        const combos = computeComboList().slice(0,5);
        if(combos.length===0) return `<div class="card"><div class="rec-sub">아직 겹치는 날짜·시간이 없어서 확정할 후보가 없어요.</div></div>`;
        return `
          <div class="card">
            <div class="name-label" style="margin-bottom:10px;">가능 인원이 많은 순서로 후보를 보여드려요. 하나를 선택해서 확정하세요.</div>
            ${combos.map((c,i)=>`
              <button class="pick-btn" data-date="${c.date}" data-time="${c.time}">
                <span>${i+1}. ${fmtLabel(c.date)}(${weekdayOf(c.date)}) ${c.time}</span>
                <span style="font-weight:800;color:var(--purpleDark);">${c.count}명</span>
              </button>
            `).join("")}
          </div>
        `;
      })()}

      <div class="section-label">개인별 응답 상세</div>
      ${(() => {
        const s = computeSmartSuggestion();
        if(!s) return "";
        return `
          <div class="rec-card" style="margin-bottom:14px;">
            <div class="rec-title" style="margin-bottom:8px;">📊 요약 & 추천</div>
            <div class="rec-sub" style="font-size:12.5px;">현재 기준 일정: <b>${fmtLabel(s.refDate)}(${weekdayOf(s.refDate)}) ${s.refTime}</b> · 참여 ${s.count}/${s.total}명 (${s.pct}%)</div>
            <div class="rec-sub" style="margin-top:8px;font-size:12.5px;line-height:1.5;">${s.suggestion}</div>
          </div>
        `;
      })()}
      ${Object.entries(state.allVotes).map(([name,v])=>`
        <div class="detail-card">
          <div style="font-size:13px;font-weight:700;">${name}</div>
          <div style="font-size:11px;color:var(--gray);margin-top:2px;">
            날짜: ${(v.dates||[]).map(fmtLabel).join(", ")||"-"} · 시간: ${(v.times||[]).join(", ")||"-"} · 지역: ${(v.regions&&v.regions.length)?v.regions.join(", "):(v.region||"-")}
          </div>
          ${v.memo?`<div style="font-size:11px;color:var(--purpleDark);margin-top:2px;">메모: ${v.memo}</div>`:""}
        </div>
      `).join("")}

      <div class="section-label">위험 구역</div>
      <div class="card" style="border-color:var(--redbg);">
        <div class="name-label" style="margin-bottom:10px;">다 쓴 모임은 완전히 삭제할 수 있어요. 삭제하면 복구할 수 없어요.</div>
        <button id="deleteRoomBtn" class="submit-btn" style="background:#fff;color:var(--red);border:1px solid var(--red);box-shadow:none;margin-top:0;">🗑 이 모임 삭제하기</button>
      </div>
    `;
    document.getElementById("refreshBtn").addEventListener("click", loadAllVotes);
    const unfinalizeBtn = document.getElementById("unfinalizeBtn");
    if(unfinalizeBtn) unfinalizeBtn.addEventListener("click", unfinalizeSchedule);
    body.querySelectorAll(".pick-btn").forEach(b=>{
      b.addEventListener("click", ()=>finalizeSchedule(b.dataset.date, b.dataset.time));
    });
    document.getElementById("deleteRoomBtn").addEventListener("click", deleteRoom);
  }

  render();
})();
</script>
</body>
</html>
